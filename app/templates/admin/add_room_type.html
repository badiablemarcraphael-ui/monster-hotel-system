{% extends 'base.html' %}

{% block content %}
<div class="form-container" style="max-width: 600px; margin: auto; background: var(--surface-dark); padding: 2rem; border: 1px solid var(--neon-cyan); border-radius: 5px;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px;">
        <h2 style="color: var(--neon-cyan); margin: 0;">ADD NEW ROOM TYPE</h2>
        <a href="{{ url_for('admin.dashboard') }}" style="color: var(--text-light); text-decoration: none; font-size: 0.9rem;">[ Return to Terminal ]</a>
    </div>

    <form method="POST" action="">
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 5px; color: var(--neon-cyan);">Classification Name</label>
            <input type="text" name="name" required placeholder="e.g., Cyber Suite, Standard Pod" style="width: 100%; padding: 10px; background: var(--bg-dark); border: 1px solid #333; color: white;">
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
            <div>
                <label style="display: block; margin-bottom: 5px; color: var(--neon-cyan);">Base Price (₱)</label>
                <input type="number" step="0.01" name="base_price" required style="width: 100%; padding: 10px; background: var(--bg-dark); border: 1px solid #333; color: white;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px; color: var(--neon-cyan);">Max Capacity (Pax)</label>
                <input type="number" name="capacity" required style="width: 100%; padding: 10px; background: var(--bg-dark); border: 1px solid #333; color: white;">
            </div>
        </div>

        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 5px; color: var(--neon-cyan);">Image URL</label>
            <input type="text" name="image_url" placeholder="https://..." style="width: 100%; padding: 10px; background: var(--bg-dark); border: 1px solid #333; color: white;">
            <small style="color: #666;">*For now, paste an image link. We will build local image uploading later.</small>
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 5px; color: var(--neon-cyan);">System Description</label>
            <textarea name="description" rows="4" required style="width: 100%; padding: 10px; background: var(--bg-dark); border: 1px solid #333; color: white; resize: vertical;"></textarea>
        </div>

        <button type="submit" class="btn-accent" style="width: 100%;">Initialize Room Type</button>
    </form>
</div>
{% endblock %}
